name: Gate

on:
  merge_group:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      type:
        description: 'Test type to run'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - unit
          - integration
      platforms:
        description: 'Platforms to test (comma-separated)'
        required: false
        type: string
        default: 'node,deno,bun,browser'

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - '*.json'
              - '*.ts'
              - '*.js'
              - '*.lock'

  static:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_static-checks.yaml

  platforms:
    needs: static
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_platform-tests.yaml
    with:
      type: ${{ inputs.type || 'all' }}
      platforms: ${{ inputs.platforms || 'node,deno,bun,browser' }}

  result:
    runs-on: ubuntu-latest
    needs: [changes, static, platforms]
    if: always()
    steps:
      - name: Verify
        run: |
          if [[ "${{ needs.changes.outputs.code }}" == "false" ]]; then
            echo "No code changes - skipping tests"
            exit 0
          fi
          if [[ "${{ needs.static.result }}" != "success" ]]; then
            echo "Static checks failed"
            exit 1
          fi
          if [[ "${{ needs.platforms.result }}" != "success" ]]; then
            echo "Platform tests failed"
            exit 1
          fi
          echo "All checks passed"
